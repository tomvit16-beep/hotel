<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hotel Sim — Поддержка</title>
  <style>
    :root {
      --bg: #f3f5ef;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #5d6a5d;
      --accent: #1f6b45;
      --line: #d9e1d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 80% -20%, #d8e5d9, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 44px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(19, 31, 23, 0.07);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 14px; line-height: 1.5; color: var(--muted); }
    .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 600;
      border: 1px solid var(--line);
      color: var(--text);
      background: #f7faf7;
    }
    .btn.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .meta { margin-top: 16px; font-size: 13px; color: #6a766a; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Hotel Sim</h1>
      <p>Официальная страница поддержки приложения.</p>
      <div class="links">
        <a class="btn primary" href="./support.html">Служба поддержки</a>
        <a class="btn" href="./privacy.html">Политика конфиденциальности</a>
      </div>
      <div class="meta">Last updated: April 26, 2026</div>
    </section>
  </main>
</body>
</html>
